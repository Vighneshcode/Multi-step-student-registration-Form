<!DOCTYPE html>
<html>
    <head>
        <title>Fildset & Legend Tag</title>
        <style>
                form{
                    width: 700px;
                    border: 3px solid black;
                    background-color:#e9ecef;
                    margin: auto;      
                    padding: 20px;
                    }
                h3{
                    text-align: center;
                    }
                fieldset{
                        width: 500px;
                        margin: auto; 
                        text-align: center;               
                        }
                label{
                        text-decoration: underline;
                        }
                #abc{
                        text-align: left;
                }
                .xyz{
                        text-align: left;
                }
        </style>
    </head>
    <body>
        <form action="index.html"
                target="_blank">
            <fieldset>                 
                <legend><b>Account Details</b></legend>
                <div id="abc"> 

                    <label for="username"><b>Username:</b></label>
                    <input type="text" name="username" id="username"
                            required><br><br>

                    <label for="password"><b>Password:</b></label>
                    <input type="password" name="password" id="password"
                            maxlength="8"
                            required><br><br>

                    <label for="cp"><b>Confirm Password:</b></label>
                    <input type="password" name="cp" id="cp"
                            maxlength="8"
                            required>  
                </div> 
            </fieldset>

            <fieldset>
                <legend><b>Additional Information</b></legend>
                <div class="xyz">
                    <label for="hb"><b>Hobbies:</b></label>
                        <textarea name="Hobbies" id="hb" style="resize: none;"></textarea> <br><br>
                            <label for="lk"><b>Languages Known:</b></label>
                            <select name="lk" id="lk" required>
                                    <option value="Marathi">Marathi</option>
                                    <option value="Hindi">Hindi</option>
                                    <option value="English">English</option>
                                    <option value="Telgu">Telugu</option>
                            </select><br><br>

                    <label for="sp"><b>Special Notes:</b></label>
                        <textarea name="sp" id="sp"
                                style="resize: none;">
                        </textarea>
                </div>
            </fieldset>

            <fieldset>
                <legend><b>Declaration</b></legend>
                    <input type="checkbox"
                            id="declaration"
                            required>

                <label for="declaration">
                        I hereby declare that all the information provided is true and correct.
                </label>
                <br><br>
                    <button type="submit"><b>Submit</b></button>
            </fieldset>
         </form>
    </body>
</html>

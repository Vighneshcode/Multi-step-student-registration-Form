<!DOCTYPE html>
<html>
    <head>
        <title>Student Information</title>
        <style>
             form{
                    width: 700px;
                    border-radius: 8px;
                    background-color: #e9ecef;                    
                    background-color:#e9ecef;
                    margin: auto;      
                    padding: 20px;
                    }

                    h3{
                        text-align: center;
                        }
                    fieldset{
                            width: 500px;
                            margin: auto; 
                            text-align: center;               
                            }
                    label{
                            text-decoration: underline;
                            }
                    .vigh{
                            text-align:left;
                            margin: auto;
                            }
                </style>
        </head>
    <body>
        <h3><b>Student Information</b></h3>
        <form action="academic.html"
                target="_blank"> 
            <fieldset>
                    <legend><b>Personal Information</b></legend>
                    <label for="name"><b>Name:</b></label>
                    <input type="text"
                            name="name"
                            id="name"
                            pattern="[A-Za-z ]+"
                            required><br><br>

                    <label for="DOB"><b>DOB</b></label>
                    <input  type="date" name="DOB" id="DOB"
                            required>

                        <br><br>
                    <label for="gender"><b>Gender:</b></label>
                    <input type="radio" name="gender" id="Male" required>
                    <label for="Male">Male</label>
                    <input type="radio" name="gender" id="Female">
                    <label for="Female">Female</label>                  
                    <br><br>
                                                                   
                    <label for="Bgroup"><b>Blood Group:</b></label>
                    <select name="Bgroup" id="Bgroup" required>
                    <option value="">Select Blood Group</option>                                    
                        <option value="A+">A+</option>
                        <option value="A-">A-</option>
                        <option value="B+">B+</option>
                        <option value="B-">B-</option>
                        <option value="O+">O+</option>
                        <option value="O-">O-</option>
                        <option value="AB+">AB+</option>
                        <option value="AB-">AB-</option>
                        </select>
            </fieldset> 

            <fieldset>
                    <legend><b>Contact Information</b></legend>
                    <div class="vigh"> 
                    <label for="Mno"><b>Mobile No:</b></label>
                    <input type="text" name="Mno" id="Mno"
                    pattern="[0-9]{10}"
                    maxlength="10"
                    required> <br><br>

                    <label for="email"><b>Email Address:</b></label>
                    <input type="email" name="email" id="email"><br><br>

                    <label for="Gno"><b>Parent Contact No:</b></label>
                    <input type="text" name="Gno" id="Gno"
                    pattern="[0-9]{8,10}"
                    maxlength="10"><br><br>

                    <label for="cno"><b>Emergency No:</b></label>
                    <input type="text" name="cno" id="cno"
                    pattern="[0-9]{8,10}"
                    maxlength="10">                       
                    </div>
            </fieldset>

            <fieldset>
                    <legend><b>Address</b></legend>
                    <label for="HouseNo"><b>HouseNo:</b></label>
                    <input type="text" name="HouseNo" id="HouseNo"
                    required>

                    <label for="City"><b>City:</b></label>
                    <input type="text" name="City" id="City"> <br> <br>

                    <label for="State"><b>State:</b></label>
                    <input type="text" name="State" id="State">

                    <label for="pincode"><b>pincode:</b></label>
                    <input type="text" name="pincode" id="pincode"
                    pattern="[0-9]{5,6}"
                    maxlength="6"
                    required> <br><br>

                    <label for="Country"><b>Country:</b></label>                 
                    <input type="text" name="Country" id="Country" pattern="[A-Za-z ]+" required>
                    <br><br>

                    <button type="submit"><b>Next</b></button>                    
            </fieldset>                          
        </form>
    </body>
</html>
